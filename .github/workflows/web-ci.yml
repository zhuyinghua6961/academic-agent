name: Web Branch CI

on:
  push:
    branches: [web]
  pull_request:
    branches: [web]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm -r typecheck
      - run: bash deploy/scripts/check-no-mock.sh
      - run: pnpm --filter @academic-agent/web build

  platform-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -f services/platform-java/pom.xml -pl app -am test

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, platform-java]
    steps:
      - uses: actions/checkout@v4
      - run: cp deploy/docker/.env.example deploy/docker/.env
      - run: docker compose -f deploy/docker/compose.yml --profile full up -d --build
      - run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8088/api/v1/health; then
              echo "nginx+platform healthy"
              exit 0
            fi
            sleep 10
          done
          docker compose -f deploy/docker/compose.yml logs
          exit 1
