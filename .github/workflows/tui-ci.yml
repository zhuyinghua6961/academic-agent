name: TUI Branch CI

on:
  push:
    branches: [tui, main]
  pull_request:
    branches: [tui, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm -r typecheck
      - run: make test
        env:
          ACADEMIC_AGENT_RECORDED_PROVIDER: "1"
