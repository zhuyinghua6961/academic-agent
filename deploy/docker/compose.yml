name: academic-agent

networks:
  academic-agent-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  minio_data:
  agent_workspaces:

services:
  postgres:
    profiles: [infra, full]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-academic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academic_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-academic_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-academic} -d ${POSTGRES_DB:-academic_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    profiles: [infra, full]
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    profiles: [infra, full]
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/bitnami/kafka
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  minio:
    profiles: [infra, full]
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    profiles: [infra, full]
    image: minio/mc:RELEASE.2024-12-18T13-15-44Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/$${MINIO_BUCKET:-academic-agent} || true
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-academic-agent}
    networks: [academic-agent-net]

  platform-java:
    profiles: [app, full]
    build:
      context: ../..
      dockerfile: deploy/docker/platform-java/Dockerfile
    image: ${PLATFORM_JAVA_IMAGE:-academic-agent/platform-java:local}
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-academic_agent}
      DATABASE_USER: ${POSTGRES_USER:-academic}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-academic_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-academic-agent}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      PLATFORM_INTERNAL_TOKEN: ${PLATFORM_INTERNAL_TOKEN:-dev-internal-token}
      ACADEMIC_AGENT_RECORDED_PROVIDER: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  agent-runtime:
    profiles: [app, full]
    build:
      context: ../..
      dockerfile: deploy/docker/agent-runtime/Dockerfile
    image: ${AGENT_RUNTIME_IMAGE:-academic-agent/agent-runtime:local}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-academic}:${POSTGRES_PASSWORD:-academic_dev_password}@postgres:5432/${POSTGRES_DB:-academic_agent}
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-academic-agent}
      PLATFORM_INTERNAL_URL: http://platform-java:8080
      PLATFORM_INTERNAL_TOKEN: ${PLATFORM_INTERNAL_TOKEN:-dev-internal-token}
      ACADEMIC_AGENT_RECORDED_PROVIDER: "0"
      ACADEMIC_AGENT_ENABLE_LIVE_PROVIDERS: "1"
    volumes:
      - agent_workspaces:/var/academic-agent/workspaces
    depends_on:
      platform-java:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    profiles: [app, full]
    build:
      context: ../..
      dockerfile: deploy/docker/web/Dockerfile
    image: ${WEB_IMAGE:-academic-agent/web:local}
    ports:
      - "8088:80"
    depends_on:
      platform-java:
        condition: service_healthy
    networks: [academic-agent-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
