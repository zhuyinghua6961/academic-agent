server:
  port: 8080

spring:
  application:
    name: platform-java
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/academic_agent
    username: academic
    password: academic_dev_password
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

platform:
  jwt:
    secret: change-me-in-production-use-at-least-32-chars
    expiration-seconds: 86400
  credentials-encryption-key: 0123456789abcdef0123456789abcdef
  internal-token: dev-internal-token
  kafka:
    topics:
      run-execute: run.execute
      run-events: run.events
      run-completed: run.completed

logging:
  level:
    root: INFO
    com.academicagent: INFO
